# YDLidar X2 Configuration
ydlidar_ros2_driver_node:
  ros__parameters:
    port: /dev/ydlidar
    frame_id: laser_frame
    ignore_array: ""
    baudrate: 115200
    lidar_type: 1            # 1 = Triangle (X2 is triangulation)
    device_type: 0           # 0 = serial
    sample_rate: 3           # 3 KHz for X2
    abnormal_check_count: 4
    resolution_fixed: true
    reversion: true
    inverted: true
    auto_reconnect: true
    isSingleChannel: true    # X2 is single-channel
    intensity: false         # X2 has no intensity
    support_motor_dtr: true  # X2 uses DTR for motor control
    angle_max: 180.0
    angle_min: -180.0
    range_max: 8.0
    range_min: 0.1
    frequency: 10.0          # scan frequency in Hz
    invalid_range_is_inf: true
